<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Контакты • ChemTests</title>
  <link rel="stylesheet" href="./assets/css/styles.css"/>
  <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml"/>
  <meta name="description" content="Контакты и обратная связь."/>

  <style>
    .hero-photo-inline{
      float:right;
      width:min(220px, 38%);
      margin:0 0 8px 14px;
      border-radius:16px;
      overflow:hidden;
      border:1px solid var(--border);
      background: var(--card);
    }
    .hero-photo-inline img{ display:block; width:100%; height:100%; object-fit:cover; }
    .hero-photo-inline figcaption{ padding:6px 8px; font-size:12px; color:var(--muted); }
    @media (max-width: 960px){
      .hero-photo-inline{ float:none; width:100%; max-width:100%; margin:0 0 10px; }
    }
  </style>
</head>
<body data-ink="a">
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="./index.html" aria-label="На главную">
        <span class="pill">ChemTests</span>
        <span class="small">химия • тесты • теория</span>
      </a>

      <nav class="navlinks" aria-label="Навигация">
        <a href="./tests.html">Тесты</a>
        <a href="./theory-tests.html">Теория тестов</a>
        <a href="./chemistry.html">Химия</a>
        <a href="./glossary.html">Справочник</a>
        <a href="./contact.html">Контакты</a>
      </nav>
    </div>
  </header>

  <main class="container" id="appRoot">
    <section class="card" style="margin-top:18px">
      <div class="card-pad">
        <h1 style="margin:0 0 10px">Контакты</h1>
        <p class="lead">Напиши сообщение — оно откроется в почтовом клиенте.</p>

        <figure class="hero-photo-inline">
          <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Mail-envelope.png?width=600" alt="Рисунок конверта электронной почты" loading="lazy"/>
          <figcaption>Иконка конверта электронной почты · Wikimedia Commons</figcaption>
        </figure>

        <div class="form-row">
          <div>
            <label class="small">Имя</label>
            <input id="name" placeholder="Например: Иван"/>
          </div>
          <div>
            <label class="small">Email</label>
            <input id="email" placeholder="name@example.com"/>
          </div>
        </div>
        <div style="margin-top:12px">
          <label class="small">Сообщение</label>
          <textarea id="message" placeholder="Текст сообщения..."></textarea>
        </div>

        <div class="form-actions">
          <button class="btn" id="sendBtn" type="button">Отправить</button>
          <button class="btn btn-ghost" id="clearBtn" type="button">Очистить</button>
        </div>

        <div class="small" id="status" style="margin-top:10px"></div>
      </div>
    </section>

    <div class="footer">
      <hr class="sep"/>
      <div class="small">Тема выбирается автоматически по настройке системы.</div>
    </div>
  </main>

  <script>
    (async () => {
      const proto = location.protocol;
      const ok = proto === 'http:' || proto === 'https:';

      if (!ok) {
        const root = document.getElementById('appRoot') || document.body;
        root.innerHTML = `
          <div class="card" style="margin-top:18px">
            <div class="card-pad">
              <h1 style="margin:0 0 10px">Нужен запуск через сервер</h1>
              <p class="lead">Открой страницу через Live Server (http://127.0.0.1:5500/...), иначе модульные скрипты блокируются (CORS).</p>
            </div>
          </div>
        `;
        return;
      }

      const m = document.createElement('link');
      m.rel = 'manifest';
      m.href = './manifest.webmanifest';
      document.head.appendChild(m);

      await import('./assets/js/prefs.js');
      const { wirePWA } = await import('./assets/js/app.js');
      await import('./assets/js/email.js');
      wirePWA();
    })();
  </script>
</body>
</html>
