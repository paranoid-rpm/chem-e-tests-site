<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Контакты — ChemTests</title>
  <link rel="stylesheet" href="./assets/css/styles.css"/>
  <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml"/>
</head>
<body data-ink="c">
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="./index.html" aria-label="На главную"><span class="pill">ChemTests</span></a>
      <nav class="navlinks" aria-label="Навигация">
        <a href="./tests.html">Тесты</a>
        <a href="./theory-tests.html">Теория тестов</a>
        <a href="./history-tests.html">История</a>
        <a href="./chemistry.html">Химия</a>
        <a href="./glossary.html">Справочник</a>
        <a href="./gallery.html">Фото</a>
        <a href="./contact.html">Контакты</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="card"><div class="card-pad">
      <h2>Контакты</h2>
      <p>Если хочешь добавить свои фотографии/тесты или поправить ошибки — напиши.</p>
    </div></div>

    <section class="gallery is-single" style="margin-top:14px" aria-label="Фото на странице">
      <figure class="imgcard">
        <img class="photo" src="./assets/img/pages/contact-01.jpg" alt="Фото: лаборатория" onerror="this.onerror=null;this.src='./assets/img/photo-placeholder-10.svg';"/>
        <figcaption class="small">Контакты — 01</figcaption>
      </figure>
    </section>

    <div class="card" style="margin-top:14px"><div class="card-pad">
      <form id="contactForm" aria-label="Форма обратной связи">
        <div class="form-row">
          <div>
            <label class="small" for="name">Имя</label>
            <input id="name" name="name" autocomplete="name"/>
          </div>
          <div>
            <label class="small" for="email">Почта</label>
            <input id="email" name="email" type="email" autocomplete="email"/>
          </div>
        </div>
        <div style="margin-top:12px">
          <label class="small" for="message">Сообщение</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn" type="submit">Отправить</button>
        </div>
        <div id="emailStatus" class="small" style="margin-top:10px"></div>
      </form>
    </div></div>

    <div class="footer"><hr class="sep"/><div class="small">Тема выбирается автоматически по настройке системы.</div></div>
  </main>

  <script type="module">
    import "./assets/js/prefs.js";
    import { wirePWA } from "./assets/js/app.js";
    import { initEmailForm } from "./assets/js/email.js";
    wirePWA();
    initEmailForm();
  </script>
</body>
</html>
