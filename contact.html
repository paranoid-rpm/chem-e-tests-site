<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Контакты • ChemTests</title>
  <link rel="manifest" href="./manifest.webmanifest"/>
  <link rel="stylesheet" href="./assets/css/styles.css"/>
  <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml"/>
  <meta name="description" content="Контакты и обратная связь."/>
</head>
<body data-ink="a">
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="./index.html" aria-label="На главную">
        <span class="pill">ChemTests</span>
        <span class="small">химия • тесты • теория</span>
      </a>

      <nav class="navlinks" aria-label="Навигация">
        <a href="./tests.html">Тесты</a>
        <a href="./theory-tests.html">Теория тестов</a>
        <a href="./chemistry.html">Химия</a>
        <a href="./glossary.html">Справочник</a>
        <a href="./contact.html">Контакты</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card" style="margin-top:18px">
      <div class="card-pad">
        <h1 style="margin:0 0 10px">Контакты</h1>
        <p class="lead">Напиши сообщение — оно откроется в почтовом клиенте.</p>

        <div class="form-row">
          <div>
            <label class="small">Имя</label>
            <input id="name" placeholder="Например: Иван"/>
          </div>
          <div>
            <label class="small">Email</label>
            <input id="email" placeholder="name@example.com"/>
          </div>
        </div>
        <div style="margin-top:12px">
          <label class="small">Сообщение</label>
          <textarea id="message" placeholder="Текст сообщения..."></textarea>
        </div>

        <div class="form-actions">
          <button class="btn" id="sendBtn" type="button">Отправить</button>
          <button class="btn btn-ghost" id="clearBtn" type="button">Очистить</button>
        </div>

        <div class="small" id="status" style="margin-top:10px"></div>
      </div>
    </section>

    <section class="gallery is-single" style="margin-top:14px" aria-label="Иллюстрация">
      <figure class="imgcard">
        <img class="illus" src="./assets/img/illus/contact.svg" alt="Иллюстрация: письмо"/>
        <figcaption class="small">Контакты</figcaption>
      </figure>
    </section>

    <div class="footer">
      <hr class="sep"/>
      <div class="small">Тема выбирается автоматически по настройке системы.</div>
    </div>
  </main>

  <script type="module">
    import "./assets/js/prefs.js";
    import { wirePWA } from "./assets/js/app.js";
    import "./assets/js/email.js";
    wirePWA();
  </script>
</body>
</html>
