<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Фото — ChemTests</title>
  <link rel="stylesheet" href="./assets/css/styles.css"/>
  <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml"/>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="./index.html"><span class="pill">ChemTests</span></a>

      <nav class="navlinks" aria-label="Навигация">
        <a href="./tests.html">Тесты</a>
        <a href="./theory-tests.html">Теория тестов</a>
        <a href="./history-tests.html">История</a>
        <a href="./chemistry.html">Химия</a>
        <a href="./glossary.html">Справочник</a>
        <a href="./gallery.html">Фото</a>
        <a href="./contact.html">Контакты</a>

        <span class="nav-sep" aria-hidden="true"></span>

        <label class="small" for="styleSelect" style="margin-right:6px">Стиль</label>
        <select id="styleSelect" data-action="style-select" class="select" aria-label="Выбор стиля">
          <option value="minimal">Минимализм</option>
          <option value="aurora">Аура</option>
          <option value="mono">Моно</option>
        </select>

        <button class="btn btn-ghost" data-action="font-dec" title="Уменьшить текст">A−</button>
        <button class="btn btn-ghost" data-action="font-inc" title="Увеличить текст">A+</button>
        <button class="btn btn-ghost" data-action="toggle-contrast" title="Высокий контраст">Контраст</button>
        <button class="btn btn-ghost" data-action="toggle-motion" title="Меньше анимаций">Движение</button>
        <button class="btn btn-ghost" data-action="toggle-theme" title="Светлая/темная тема">Тема</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <div class="card-pad">
        <h2>Галерея</h2>
        <p>Иллюстрации можно заменить своими фотографиями: просто положи файлы в <code>assets/img/</code> и поменяй пути ниже.</p>
      </div>
    </div>

    <section class="gallery" style="margin-top:14px" aria-label="Изображения">
      <figure class="imgcard">
        <img src="./assets/img/gallery-flask.svg" alt="Лабораторная колба"/>
        <figcaption class="small">Лабораторная посуда</figcaption>
      </figure>
      <figure class="imgcard">
        <img src="./assets/img/gallery-molecule.svg" alt="Модель молекулы"/>
        <figcaption class="small">Модели и структуры</figcaption>
      </figure>
      <figure class="imgcard">
        <img src="./assets/img/gallery-periodic.svg" alt="Таблица элементов"/>
        <figcaption class="small">Периодическая система</figcaption>
      </figure>
      <figure class="imgcard">
        <img src="./assets/img/gallery-notes.svg" alt="Конспект и формулы"/>
        <figcaption class="small">Конспект и задачи</figcaption>
      </figure>
      <figure class="imgcard">
        <img src="./assets/img/gallery-safety.svg" alt="Знак безопасности"/>
        <figcaption class="small">Техника безопасности</figcaption>
      </figure>
      <figure class="imgcard">
        <img src="./assets/img/gallery-class.svg" alt="Класс и урок"/>
        <figcaption class="small">Урок и практика</figcaption>
      </figure>
    </section>

    <div class="footer">
      <hr class="sep"/>
      <div class="small">Раздел подходит как витрина для школьного проекта.</div>
    </div>
  </main>

  <script type="module">
    import { initTheme, wireThemeToggle } from "./assets/js/app.js";
    import { initPrefs, wirePrefs } from "./assets/js/prefs.js";
    initTheme(); wireThemeToggle();
    initPrefs(); wirePrefs();
  </script>
</body>
</html>
