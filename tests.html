<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Тесты — ChemTests</title>
  <link rel="stylesheet" href="./assets/css/styles.css"/>
  <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml"/>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="./index.html" aria-label="На главную">
        <span class="pill">ChemTests</span>
      </a>

      <nav class="navlinks" aria-label="Навигация">
        <a href="./tests.html">Тесты</a>
        <a href="./theory-tests.html">Теория тестов</a>
        <a href="./history-tests.html">История</a>
        <a href="./chemistry.html">Химия</a>
        <a href="./glossary.html">Справочник</a>
        <a href="./gallery.html">Фото</a>
        <a href="./contact.html">Контакты</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <div class="card-pad">
        <h2>Тесты</h2>
        <p>Выбери вариант слева или найди нужную тему через поиск и фильтр.</p>

        <div class="grid" style="grid-template-columns: 1.2fr .8fr 1fr; margin-top:12px">
          <div class="tile">
            <label class="small" for="testSearch">Поиск</label>
            <input id="testSearch" placeholder="Например: растворы, валидность, безопасность"/>
          </div>
          <div class="tile">
            <label class="small" for="testCategory">Категория</label>
            <select id="testCategory" class="select"></select>
          </div>
          <div class="tile">
            <div class="small">Режим</div>
            <label class="small" style="display:flex;gap:8px;align-items:center;margin-top:8px">
              <input id="trainerMode" type="checkbox" style="width:auto"/>
              Тренировка (с пояснениями)
            </label>
          </div>
        </div>

        <div class="small" id="progressInfo" style="margin-top:10px"></div>
      </div>
    </div>

    <section class="quiz" style="margin-top:14px">
      <div class="card quiz-list">
        <div class="card-pad">
          <div id="quizList" aria-label="Список тестов"></div>
        </div>
      </div>

      <div class="card" id="quizBox" aria-label="Окно теста"></div>
    </section>

    <div class="footer">
      <hr class="sep"/>
      <div class="small">Тема выбирается автоматически по настройке системы.</div>
    </div>
  </main>

  <script type="module">
    import "./assets/js/prefs.js";
    import { wirePWA } from "./assets/js/app.js";
    import { initQuiz } from "./assets/js/quiz.js";

    wirePWA();
    initQuiz();
  </script>
</body>
</html>
