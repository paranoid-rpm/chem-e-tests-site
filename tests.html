<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Тесты — ChemTests</title>
  <link rel="stylesheet" href="./assets/css/styles.css"/>
  <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml"/>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="./index.html"><span class="pill">ChemTests</span></a>

      <nav class="navlinks" aria-label="Навигация">
        <a href="./tests.html">Тесты</a>
        <a href="./theory-tests.html">Теория тестов</a>
        <a href="./history-tests.html">История</a>
        <a href="./chemistry.html">Химия</a>
        <a href="./glossary.html">Справочник</a>
        <a href="./gallery.html">Фото</a>
        <a href="./contact.html">Контакты</a>

        <span class="nav-sep" aria-hidden="true"></span>

        <label class="small" for="styleSelect" style="margin-right:6px">Стиль</label>
        <select id="styleSelect" data-action="style-select" class="select" aria-label="Выбор стиля">
          <option value="minimal">Минимализм</option>
          <option value="aurora">Аура</option>
          <option value="mono">Моно</option>
        </select>

        <button class="btn btn-ghost" data-action="font-dec" title="Уменьшить текст">A−</button>
        <button class="btn btn-ghost" data-action="font-inc" title="Увеличить текст">A+</button>
        <button class="btn btn-ghost" data-action="toggle-contrast" title="Высокий контраст">Контраст</button>
        <button class="btn btn-ghost" data-action="toggle-motion" title="Меньше анимаций">Движение</button>
        <button class="btn btn-ghost" data-action="toggle-theme" title="Светлая/темная тема">Тема</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <div class="card-pad">
        <h2>Тесты</h2>
        <p>Выбери тест слева. Поиск и фильтр помогают быстро найти нужную тему.</p>

        <div class="grid" style="grid-template-columns: 1.2fr .8fr 1fr; margin-top:12px">
          <div class="tile">
            <label class="small" for="testSearch">Поиск</label>
            <input id="testSearch" placeholder="Например: растворы, валидность, безопасность"/>
          </div>
          <div class="tile">
            <label class="small" for="testCategory">Категория</label>
            <select id="testCategory" class="select"></select>
          </div>
          <div class="tile">
            <div class="small">Режим</div>
            <label class="small" style="display:flex;gap:8px;align-items:center;margin-top:8px">
              <input id="trainerMode" type="checkbox" style="width:auto"/>
              Режим тренировки (пояснения)
            </label>
          </div>
        </div>

        <div class="small" id="progressInfo" style="margin-top:10px"></div>
      </div>
    </div>

    <section class="quiz" style="margin-top:14px">
      <div class="card quiz-list">
        <div class="card-pad">
          <div id="quizList" aria-label="Список тестов"></div>
        </div>
      </div>

      <div class="card" id="quizBox" aria-label="Окно теста"></div>
    </section>

    <div class="footer">
      <hr class="sep"/>
      <div class="small">Если тесты не загружаются, запусти сайт через локальный сервер (README).</div>
    </div>
  </main>

  <script type="module">
    import { initTheme, wireThemeToggle } from "./assets/js/app.js";
    import { initPrefs, wirePrefs } from "./assets/js/prefs.js";
    import { initQuiz } from "./assets/js/quiz.js";

    initTheme();
    wireThemeToggle();

    initPrefs();
    wirePrefs();

    initQuiz();
  </script>
</body>
</html>
